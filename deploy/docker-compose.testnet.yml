version: "3.9"

x-aacp-common: &aacp-common
  image: golang:1.22
  restart: unless-stopped
  networks:
    - aacp-net

services:
  validator-0:
    <<: *aacp-common
    container_name: validator-0
    command: ["/bin/sh", "-lc", "cd /workspace && go run ./cmd/aacpd --port=8888"]
    ports:
      - "8888:8888"
    volumes:
      - ..:/workspace

  relay-0:
    <<: *aacp-common
    container_name: relay-0
    command: ["/bin/sh", "-lc", "cd /workspace && go run ./cmd/aacp-relay"]
    volumes:
      - ..:/workspace

  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs
    ports:
      - "5001:5001"
      - "8080:8080"
    networks:
      - aacp-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9191:9090"
    networks:
      - aacp-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - aacp-net

networks:
  aacp-net:
    driver: bridge
